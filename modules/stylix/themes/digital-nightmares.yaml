scheme: "Digital Nightmares"
author: "Jason Bou Kheir"
variant: "dark"

# -- The Casing (Dark Violet Backgrounds) --
base00: "1a1726" # Deepest void (Main Editor Canvas)
base01: "29263b" # exact bg (Panels, Statuslines, Inactive Tabs)
base02: "3b3754" # Lighter violet (Selection, Hover States)
base03: "554f7a" # Glitchy purple (Comments, Line numbers - legible but recedes)

# -- The Alphas (Teal Text Track) --
base04: "6ebdae" # Muted teal (Secondary UI Text)
base05: "9de7d7" # exact teal (DEFAULT TEXT - The Teal Alphas!)
base06: "bbf0e5" # Lighter glowing teal (Prominent UI Text)
base07: "dcfaf4" # Brightest teal (Maximum Contrast Text)

# -- The Modifiers & Neon Glitch (Syntax Track) --
base08: "ff4da6" # Hot Neon Pink (Operators like '=', Punctuation - pure vaporwave glitch)
base09: "ffb08f" # Rich peach (Numbers, Constants)
base0A: "8ae0ff" # exact blue (Classes, Types)
base0B: "f2f0a1" # exact yellow (STRINGS - Creamy yellow strings pop beautifully against violet)
base0C: "00f0ff" # NEON CYAN (Regex, Escapes - Replaces the ugly dark blue with a bright neon tube!)
base0D: "ac4fc6" # exact magenta (Functions, Methods)
base0E: "f1b2dc" # exact pink (KEYWORDS like 'let', 'if', 'in' - The Pink Modifiers!)
base0F: "f2c791" # Soft peach (Macros, Deprecated)
